name: Publish release
on:
  release:
    types: [created]
  workflow_call:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write # For OIDC Trusted Publishing
jobs:
  publish-npm-jsr: # Publish to NPM; also to JSR if jsr.json exists
    name: Publish to NPM and JSR
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # Remove git token after fetch
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4
        with:
          registry-url: "https://registry.npmjs.org"
          node-version: 24.15.0 # Relevant as per May 2026, must be specific for determinism.
          package-manager-cache: false # Mitigate cache poisoning
      - run: npm ci # Built-in NPM version, do not install newer
      - run: npm run build --if-present
      - name: Ensure NPM version has not been published yet
        run: npm publish --dry-run
      - name: Ensure NPM version matches git tag
        run: |
          VER1=$(node -e 'console.log(require("./package.json").version)')
          VER2=${{ github.event.release.tag_name }}
          echo "npm $VER1, git $VER2"
          [[ $VER1 == $VER2 ]] || { echo "NPM-Git version mismatch, exiting..."; exit 1; }
      - name: Publish to JSR if jsr.json exists
        run: | # Use flag --allow-slow-types if it's present in ./jsr.json
          VER1=$(node -e 'console.log(require("./package.json").version)')
          VER2=$(node -e 'console.log(require("./jsr.json").version)')
          echo "npm $VER1, jsr $VER2"
          [[ $VER1 == $VER2 ]] || { echo "NPM-JSR version mismatch, exiting..."; exit 1; }
          SLOW_TYPES=$(node -e 'console.log(require("./jsr.json").allowSlowTypes ? "--allow-slow-types" : "")')
          npm install -g jsr
          jsr publish $SLOW_TYPES
        if: ${{ hashFiles('jsr.json') != '' }}
      - run: npm publish --access public
