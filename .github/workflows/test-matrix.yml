name: Run tests
on:
  workflow_call:
    inputs:
      submodules:
        default: false
        required: false
        type: boolean
  workflow_dispatch:
jobs:
  node:
    name: Node v${{ matrix.node }} @ ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    env:
      MSHOULD_FAST: 1
    strategy:
      matrix:
        node: [22, 24, 26] # May 2026 LTS
        os: [ubuntu-24.04-arm, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: ${{ inputs.submodules }}
      - name: Use Node.js ${{ matrix.node }} @ ${{ matrix.os }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4
        with:
          registry-url: "https://registry.npmjs.org"
          cache: npm
          node-version: ${{ matrix.node }}
      - run: npm install
      - run: npm run build --if-present
      - run: npm test
